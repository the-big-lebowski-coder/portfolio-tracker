services:
  - type: web
    name: portfolio-tracker
    runtime: node
    plan: free
    buildCommand: pnpm install --frozen-lockfile && BASE_PATH=/piggy-bank/ pnpm --filter @workspace/piggy-bank run build
    startCommand: pnpm --filter @workspace/api-server run build && node --enable-source-maps artifacts/api-server/dist/index.mjs
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: FINNHUB_API_KEY
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: DATABASE_URL
        sync: false
