<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stock Portfolio Tracker</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f9f8f6; color: #333; }
    
    .container { display: flex; height: 100vh; gap: 16px; padding: 1rem; }
    .sidebar { width: 240px; border-right: 1px solid #e0e0e0; padding-right: 16px; overflow-y: auto; }
    .main { flex: 1; overflow-y: auto; }
    
    h1 { font-size: 22px; font-weight: 500; margin-bottom: 1.5rem; }
    h2 { font-size: 16px; font-weight: 500; margin-bottom: 1rem; }
    
    .form-group { margin-bottom: 1.5rem; }
    label { display: block; font-size: 13px; color: #666; margin-bottom: 8px; font-weight: 500; }
    input, select { width: 100%; padding: 8px 12px; border: 1px solid #e0e0e0; border-radius: 6px; font-size: 14px; }
    
    button { padding: 8px 12px; border-radius: 6px; font-size: 14px; cursor: pointer; font-weight: 500; border: none; }
    .btn-secondary { background: #f0f0f0; border: 1px solid #e0e0e0; color: #333; }
    .btn-primary { background: #378ADD; border: none; color: white; }
    
    .btn-secondary:hover { background: #e8e8e8; }
    .btn-primary:hover { background: #2870c4; }
    
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; }
    
    .card { background: white; border: 1px solid #e0e0e0; border-radius: 8px; padding: 1rem; cursor: pointer; transition: all 0.2s; position: relative; }
    .remove-btn { position: absolute; top: 6px; right: 6px; background: none; border: none; color: #ccc; font-size: 16px; cursor: pointer; line-height: 1; padding: 2px 6px; border-radius: 4px; z-index: 1; }
    .remove-btn:hover { color: #f44336; background: #fff0f0; }
    .card:hover { border-color: #ccc; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .card.highlight { border-color: #4caf50; }
    
    .ticker { font-size: 16px; font-weight: 500; margin-bottom: 2px; }
    .category { font-size: 12px; color: #999; }
    .price { font-size: 18px; font-weight: 500; margin: 12px 0 4px; }
    .change { font-size: 14px; font-weight: 500; }
    .change.up { color: #4caf50; }
    .change.down { color: #f44336; }
    .premarket-info { font-size: 11px; color: #888; margin-top: 3px; }
    .premarket-info .premarket-label { font-weight: 600; }
    .premarket-info .up { color: #4caf50; }
    .premarket-info .down { color: #f44336; }
    .ticker-row { display: flex; align-items: baseline; gap: 6px; }
    .company-name { font-size: 12px; color: #777; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .high52 { font-size: 12px; color: #999; margin-top: 4px; }
    
    .metrics { font-size: 11px; color: #666; margin-top: 8px; padding-top: 8px; border-top: 1px solid #f0f0f0; }
    .metric-row { display: flex; justify-content: space-between; margin-bottom: 4px; }
    
    .badge { display: inline-block; font-size: 11px; padding: 3px 8px; border-radius: 4px; margin-right: 6px; margin-bottom: 6px; font-weight: 500; }
    .badge-high { background: #e8f5e9; color: #2e7d32; }
    .badge-alert { background: #e3f2fd; color: #1565c0; }
    
    .btn-set-alert { width: 100%; padding: 8px; background: #f5f5f5; border: 1px solid #e0e0e0; border-radius: 6px; margin-top: 12px; cursor: pointer; }
    .btn-set-alert:hover { background: #ebebeb; }
    
    .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; overflow-y: auto; }
    .modal.active { display: flex; }
    .modal-content { background: white; border-radius: 8px; padding: 2rem; max-width: 900px; width: 90%; max-height: 90vh; overflow-y: auto; margin: auto; }
    
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
    .modal-header h2 { margin: 0; }
    .close-btn { background: none; border: none; font-size: 24px; cursor: pointer; color: #999; }
    .close-btn:hover { color: #333; }
    
    .chart-container { position: relative; height: 300px; margin: 1.5rem 0; }
    
    .chart-tabs { display: flex; gap: 12px; margin-bottom: 1.5rem; }
    .chart-tab { padding: 10px 16px; border: 1px solid #e0e0e0; border-radius: 6px; background: white; cursor: pointer; font-weight: 500; }
    .chart-tab.active { background: #378ADD; color: white; border-color: #378ADD; }
    
    .status { padding: 12px; background: #f5f5f5; border-radius: 6px; font-size: 12px; color: #666; margin-top: 16px; }
    
    .loading { text-align: center; padding: 2rem; color: #999; }
    
    .stock-count { font-size: 14px; color: #999; }
    .main-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }

    .server-status { padding: 12px; margin-bottom: 12px; border-radius: 6px; font-size: 13px; text-align: center; }
    .server-status.connected { background: #e8f5e9; color: #2e7d32; }
    .server-status.disconnected { background: #ffebee; color: #c62828; }

    .mobile-bar { display: none; align-items: center; justify-content: space-between; padding: 12px 16px; background: white; border-bottom: 1px solid #e0e0e0; position: sticky; top: 0; z-index: 200; }
    .mobile-bar h1 { margin: 0; font-size: 17px; }
    .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 498; }
    .sidebar-close { display: none; position: absolute; top: 12px; right: 12px; background: none; border: none; font-size: 22px; cursor: pointer; color: #666; }

    @media (max-width: 768px) {
      .container { display: block; height: auto; padding: 0; }
      .sidebar { position: fixed; top: 0; left: 0; bottom: 0; width: min(300px, 85vw); background: white; z-index: 499; transform: translateX(-100%); transition: transform 0.25s ease; border-right: 1px solid #e0e0e0; overflow-y: auto; padding: 1rem 1rem 2rem; }
      .sidebar.open { transform: translateX(0); box-shadow: 4px 0 24px rgba(0,0,0,0.15); }
      .sidebar-overlay.open { display: block; }
      .sidebar-close { display: block; }
      .mobile-bar { display: flex; }
      .main { display: block; width: 100%; padding: 0.75rem; overflow-y: visible; }
      .grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; }
      .main-header { display: none !important; }
    }
  </style>
</head>
<body>
  <div class="mobile-bar">
    <h1>📈 Portfolio</h1>
    <button class="btn-secondary" onclick="toggleSidebar()" style="display:flex;align-items:center;gap:6px;">☰ Filters</button>
  </div>
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

  <div class="container">
    <div class="sidebar" id="sidebar" style="position:relative;">
      <button class="sidebar-close" onclick="toggleSidebar()" title="Close">×</button>
      <div id="serverStatus" class="server-status disconnected">🔴 Connecting to server...</div>
      
      <h2>Filters</h2>
      
      <div class="form-group">
        <label>Search ticker</label>
        <input type="text" id="searchInput" placeholder="e.g., MSFT">
      </div>

      <div class="form-group">
        <label>Category</label>
        <select id="categoryFilter">
          <option value="">All categories</option>
          <option value="us">US Stocks</option>
          <option value="ca">Canadian (.TO)</option>
          <option value="etf">ETFs</option>
          <option value="crypto">Crypto</option>
          <option value="index">Indices</option>
        </select>
      </div>

      <div class="form-group">
        <label>Alerts & milestones</label>
        <label style="display: flex; align-items: center; gap: 8px; margin-bottom: 6px; font-weight: 400;">
          <input type="checkbox" id="hasAlertsFilter">
          <span>Has custom alerts</span>
        </label>
        <label style="display: flex; align-items: center; gap: 8px; font-weight: 400;">
          <input type="checkbox" id="has52WeekHighFilter">
          <span>At 52-week high</span>
        </label>
      </div>

      <div class="form-group">
        <label>Sort by</label>
        <select id="sortBy" onchange="filterStocks()">
          <option value="">Default order</option>
          <option value="changePercent_desc" selected>Price change % ↓ (best first)</option>
          <option value="changePercent_asc">Price change % ↑ (worst first)</option>
          <option value="pe_asc">P/E ratio ↑ (cheapest first)</option>
          <option value="pe_desc">P/E ratio ↓ (most expensive first)</option>
          <option value="price_desc">Price ↓ (highest first)</option>
          <option value="price_asc">Price ↑ (lowest first)</option>
          <option value="high52_proximity">Nearest 52-week high</option>
          <option value="ticker_asc">Ticker A → Z</option>
          <option value="ticker_desc">Ticker Z → A</option>
        </select>
      </div>

      <button class="btn-secondary" onclick="resetFilters()" style="width: 100%; margin-bottom: 12px;">Reset filters</button>
      <button class="btn-primary" onclick="refreshData()" style="width: 100%;">Refresh data</button>

      <hr style="margin: 16px 0; border: none; border-top: 1px solid #eee;">
      <h2>Manage Tickers</h2>
      <div class="form-group">
        <label>Ticker symbol</label>
        <input type="text" id="addTickerInput" placeholder="e.g., TSLA" style="text-transform: uppercase;" onkeydown="if(event.key==='Enter') addTicker()">
      </div>
      <div class="form-group">
        <label>Category</label>
        <select id="addTickerCategory">
          <option value="us">US Stocks</option>
          <option value="ca">Canadian (.TO)</option>
          <option value="etf">ETF</option>
          <option value="crypto">Crypto</option>
          <option value="index">Index</option>
        </select>
      </div>
      <button class="btn-primary" onclick="addTicker()" style="width: 100%;">+ Add ticker</button>
      <div id="addTickerMsg" style="font-size: 12px; margin-top: 6px; display: none;"></div>

      <div class="status">
        <p style="margin-bottom: 6px;">Last updated:</p>
        <p id="lastUpdated" style="font-weight: 500;">Loading...</p>
      </div>
    </div>

    <div class="main">
      <div class="main-header">
        <h1>Your portfolio</h1>
        <span class="stock-count" id="stockCount">Loading...</span>
      </div>

      <div id="stocksContainer" class="grid">
        <div class="loading" style="grid-column: 1 / -1;">Loading stock data...</div>
      </div>
    </div>
  </div>

  <!-- Stock Detail Modal -->
  <div id="detailModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <div>
          <h2 id="detailTicker" style="margin-bottom: 0.5rem;"></h2>
          <p id="detailCategory" style="color: #999; margin: 0; font-size: 14px;"></p>
        </div>
        <button class="close-btn" onclick="closeDetailModal()">✕</button>
      </div>

      <div class="chart-tabs">
        <button class="chart-tab" onclick="switchChart('1m')">1 Month</button>
        <button class="chart-tab" onclick="switchChart('6m')">6 Months</button>
        <button class="chart-tab active" onclick="switchChart('1y')">1 Year</button>
        <button class="chart-tab" onclick="switchChart('5y')">5 Years</button>
        <button class="chart-tab" onclick="switchChart('10y')">10 Years</button>
      </div>

      <div class="chart-container">
        <canvas id="priceChart"></canvas>
      </div>

      <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin: 1.5rem 0;">
        <div style="background: #f5f5f5; padding: 12px; border-radius: 6px;">
          <p style="color: #999; font-size: 12px; margin: 0 0 4px;">Current Price</p>
          <p id="detailPrice" style="font-size: 20px; font-weight: 500; margin: 0;"></p>
        </div>
        <div style="background: #f5f5f5; padding: 12px; border-radius: 6px;">
          <p style="color: #999; font-size: 12px; margin: 0 0 4px;">Change (Today)</p>
          <p id="detailChange" style="font-size: 20px; font-weight: 500; margin: 0;"></p>
        </div>
        <div style="background: #f5f5f5; padding: 12px; border-radius: 6px;">
          <p style="color: #999; font-size: 12px; margin: 0 0 4px;">P/E Ratio</p>
          <p id="detailPE" style="font-size: 20px; font-weight: 500; margin: 0;"></p>
        </div>
        <div style="background: #f5f5f5; padding: 12px; border-radius: 6px;">
          <p style="color: #999; font-size: 12px; margin: 0 0 4px;">Forward P/E</p>
          <p id="detailForwardPE" style="font-size: 20px; font-weight: 500; margin: 0;"></p>
        </div>
        <div style="background: #f5f5f5; padding: 12px; border-radius: 6px;">
          <p style="color: #999; font-size: 12px; margin: 0 0 4px;">52-Week High</p>
          <p id="detailHigh52" style="font-size: 20px; font-weight: 500; margin: 0;"></p>
        </div>
        <div style="background: #f5f5f5; padding: 12px; border-radius: 6px;">
          <p style="color: #999; font-size: 12px; margin: 0 0 4px;">Market Cap</p>
          <p id="detailMarketCap" style="font-size: 20px; font-weight: 500; margin: 0;"></p>
        </div>
      </div>

      <button class="btn-primary" onclick="openAlertModal(currentDetailTicker)" style="width: 100%; padding: 12px; font-size: 16px; margin-top: 1.5rem;">Set Price Alert</button>
    </div>
  </div>

  <!-- Alert Modal -->
  <div id="alertModal" class="modal">
    <div class="modal-content" style="max-width: 400px;">
      <h2 style="margin-bottom: 1rem;">Set alert for <span id="alertTickerName"></span></h2>
      
      <div class="form-group">
        <label>Price target (above)</label>
        <input type="number" id="priceAbove" placeholder="e.g., 150" step="0.01">
      </div>

      <div class="form-group">
        <label>Price target (below)</label>
        <input type="number" id="priceBelow" placeholder="e.g., 120" step="0.01">
      </div>

      <div class="form-group">
        <label>Percent change alert (%)</label>
        <input type="number" id="percentChange" placeholder="e.g., 5" step="0.01">
      </div>

      <div style="display: flex; gap: 12px;">
        <button class="btn-secondary" onclick="closeAlertModal()" style="flex: 1;">Cancel</button>
        <button class="btn-primary" onclick="saveAlert()" style="flex: 1;">Save alert</button>
      </div>
    </div>
  </div>

  <script>
    const SERVER_URL = '';

    const DEFAULT_STOCKS = [
      { ticker: 'SFTBY', category: 'etf' }, { ticker: 'BAL', category: 'etf' }, { ticker: 'PWR', category: 'us' },
      { ticker: 'RMD', category: 'us' }, { ticker: 'OXO', category: 'us' }, { ticker: 'NBIS', category: 'us' },
      { ticker: 'ARCC', category: 'us' }, { ticker: 'UBER', category: 'us' }, { ticker: 'MNDY', category: 'us' },
      { ticker: 'CRS', category: 'us' }, { ticker: 'MSFT', category: 'us' }, { ticker: 'ASEA', category: 'us' },
      { ticker: 'FFH.TO', category: 'ca' }, { ticker: 'ETN', category: 'us' }, { ticker: 'IREN', category: 'us' },
      { ticker: 'GEV', category: 'us' }, { ticker: 'AER', category: 'us' }, { ticker: 'AMD', category: 'us' },
      { ticker: 'NVO', category: 'us' }, { ticker: 'GOOG', category: 'us' }, { ticker: 'PLTR', category: 'us' },
      { ticker: 'MED', category: 'us' }, { ticker: 'PRL.TO', category: 'ca' }, { ticker: 'OZEM', category: 'us' },
      { ticker: 'AAPL', category: 'us' }, { ticker: 'KSPI', category: 'us' }, { ticker: 'VST', category: 'etf' },
      { ticker: 'GLD', category: 'etf' }, { ticker: 'IBIT', category: 'etf' }, { ticker: 'HOOD', category: 'us' },
      { ticker: 'IEVA', category: 'etf' }, { ticker: 'INMD', category: 'us' }, { ticker: 'NVDA', category: 'us' },
      { ticker: 'H3P', category: 'etf' }, { ticker: 'BTDBY', category: 'etf' }, { ticker: 'EWJ', category: 'etf' },
      { ticker: 'RMDA', category: 'us' }, { ticker: 'EMDA', category: 'etf' }, { ticker: 'WIOB', category: 'us' },
      { ticker: 'OXLC', category: 'etf' }, { ticker: 'LGIH', category: 'us' }, { ticker: 'SJ.TO', category: 'ca' },
      { ticker: 'WVO', category: 'us' }, { ticker: 'VNQ', category: 'etf' }, { ticker: 'PCY', category: 'etf' },
      { ticker: 'LNR.TO', category: 'ca' }, { ticker: 'SYF', category: 'us' }, { ticker: 'NBN', category: 'us' },
      { ticker: 'VTWV', category: 'etf' }, { ticker: 'META', category: 'us' }, { ticker: 'BTC-USD', category: 'crypto' },
      { ticker: '^IXIC', category: 'index' }, { ticker: '^GSPC', category: 'index' }
    ];

    let allStocks = JSON.parse(localStorage.getItem('portfolioStocks') || 'null') || DEFAULT_STOCKS;

    function saveStocks() {
      localStorage.setItem('portfolioStocks', JSON.stringify(allStocks));
    }

    function removeTicker(ticker) {
      allStocks = allStocks.filter(s => s.ticker !== ticker);
      delete stockData[ticker];
      saveStocks();
      filterStocks();
    }

    async function addTicker() {
      const input = document.getElementById('addTickerInput');
      const category = document.getElementById('addTickerCategory').value;
      const msgEl = document.getElementById('addTickerMsg');
      const ticker = input.value.trim().toUpperCase();
      msgEl.style.display = 'none';
      if (!ticker) {
        msgEl.style.color = '#f44336';
        msgEl.textContent = 'Please enter a ticker symbol.';
        msgEl.style.display = 'block';
        return;
      }
      if (allStocks.some(s => s.ticker === ticker)) {
        msgEl.style.color = '#f44336';
        msgEl.textContent = ticker + ' is already in your list.';
        msgEl.style.display = 'block';
        return;
      }
      allStocks.push({ ticker, category });
      saveStocks();
      input.value = '';
      msgEl.style.color = '#4caf50';
      msgEl.textContent = ticker + ' added!';
      msgEl.style.display = 'block';
      setTimeout(() => { msgEl.style.display = 'none'; }, 3000);
      filterStocks();
      const data = await fetchStockData(ticker);
      if (!data.error) {
        stockData[ticker] = data;
        const metrics = await fetchMetrics(ticker);
        stockData[ticker] = { ...stockData[ticker], ...metrics };
      }
      filterStocks();
    }

    let stockData = {};
    let alerts = JSON.parse(localStorage.getItem('stockAlerts') || '{}');
    let currentAlertTicker = null;
    let currentDetailTicker = null;
    let currentChart = null;
    let currentChartType = '1y';
    let serverConnected = false;

    function getCategoryLabel(cat) {
      const labels = { us: 'US Stocks', ca: 'Canadian', etf: 'ETFs', crypto: 'Crypto', index: 'Indices' };
      return labels[cat] || cat;
    }

    async function checkServer() {
      try {
        const response = await fetch(`${SERVER_URL}/api/healthz`);
        if (response.ok) {
          serverConnected = true;
          document.getElementById('serverStatus').textContent = '🟢 Connected';
          document.getElementById('serverStatus').className = 'server-status connected';
          return true;
        }
      } catch (error) {
        console.error('Server connection failed:', error);
      }
      
      serverConnected = false;
      document.getElementById('serverStatus').textContent = '🔴 Server offline';
      document.getElementById('serverStatus').className = 'server-status disconnected';
      return false;
    }

    async function fetchStockData(ticker) {
     try {
       const response = await fetch(`${SERVER_URL}/api/quote/${ticker}`);
       const data = await response.json();
       
       if (data.c !== undefined) {
         return {
           ticker: ticker,
           price: Math.round(data.c * 100) / 100,
           change: Math.round(data.d * 100) / 100,
           changePercent: Math.round(data.dp * 100) / 100,
           high52Week: data.h ? Math.round(data.h * 100) / 100 : null,
           low52Week: data.l ? Math.round(data.l * 100) / 100 : null,
           error: false
         };
       }
       return { ticker: ticker, error: true };
     } catch (error) {
       console.error('Error fetching quote for', ticker, error);
       return { ticker: ticker, error: true };
     }
   }

    async function fetchMetrics(ticker) {
  try {
    const response = await fetch(`${SERVER_URL}/api/metrics/${ticker}`);
    const data = await response.json();
    
    if (data.metric) {
      return {
        ticker: ticker,
        pe: data.metric.peTTM ? Math.round(data.metric.peTTM * 100) / 100 : null,
        forwardPE: data.metric.forwardPE ? Math.round(data.metric.forwardPE * 100) / 100 : null,
        high52Week: data.metric['52WeekHigh'] ? Math.round(data.metric['52WeekHigh'] * 100) / 100 : null,
        marketCap: data.metric.marketCapitalization ?? null,
        error: false
      };
    }
    return { ticker: ticker, error: true };
  } catch (error) {
    console.error('Error fetching metrics for', ticker, error);
    return { ticker: ticker, error: true };
  }
}

    async function fetchHistoricalData(ticker, period) {
      try {
        const response = await fetch(`${SERVER_URL}/api/history/${ticker}/${period}`);
        const prices = await response.json();
        return prices.map(p => ({
          date: new Date(p.date),
          price: p.price
        }));
      } catch (error) {
        console.error('Error fetching history for', ticker, error);
        return [];
      }
    }

    async function loadAllStockData() {
      const isConnected = await checkServer();
      if (!isConnected) {
        const container = document.getElementById('stocksContainer');
        container.innerHTML = '<div class="loading" style="grid-column: 1 / -1;">⚠️ Cannot connect to server. Make sure the Node.js backend is running.</div>';
        return;
      }

      const container = document.getElementById('stocksContainer');
      container.innerHTML = '<div class="loading" style="grid-column: 1 / -1;">Loading stock data...</div>';
      
      const requests = allStocks.map(stock => fetchStockData(stock.ticker));
      const results = await Promise.all(requests);
      
      results.forEach(data => {
        if (!data.error) {
          stockData[data.ticker] = data;
        }
      });

      const metricsRequests = Object.keys(stockData).map(ticker => 
        fetchMetrics(ticker).then(metrics => {
          stockData[ticker] = { ...stockData[ticker], ...metrics };
        })
      );
      await Promise.all(metricsRequests);

      const allTickers = allStocks.map(s => s.ticker).join(',');
      try {
        const profileRes = await fetch(`${SERVER_URL}/api/profile/batch?tickers=${allTickers}`);
        const profiles = await profileRes.json();
        Object.entries(profiles).forEach(([ticker, name]) => {
          if (stockData[ticker]) stockData[ticker].name = name;
        });
      } catch (e) {
        console.warn('Could not load company names', e);
      }

      try {
        const preRes = await fetch(`${SERVER_URL}/api/premarket/batch?tickers=${allTickers}`);
        const preData = await preRes.json();
        Object.entries(preData).forEach(([ticker, pre]) => {
          if (stockData[ticker]) stockData[ticker].preMarket = pre;
        });
      } catch (e) {
        console.warn('Could not load pre-market data', e);
      }
      
      document.getElementById('lastUpdated').textContent = new Date().toLocaleTimeString();
      filterStocks();
    }

    function formatMarketCap(capInMillions) {
      if (!capInMillions) return 'N/A';
      if (capInMillions >= 1_000_000) return `$${(capInMillions / 1_000_000).toFixed(2)}T`;
      if (capInMillions >= 1_000) return `$${(capInMillions / 1_000).toFixed(2)}B`;
      return `$${capInMillions.toFixed(0)}M`;
    }

    function checkIs52WeekHigh(price, high52Week) {
      if (!high52Week) return false;
      return price >= high52Week * 0.98;
    }

    function sortStocks(stocks, sortBy) {
      if (!sortBy) return stocks;
      return [...stocks].sort((a, b) => {
        const da = stockData[a.ticker];
        const db = stockData[b.ticker];
        switch (sortBy) {
          case 'changePercent_desc':
            return (db?.changePercent ?? -Infinity) - (da?.changePercent ?? -Infinity);
          case 'changePercent_asc':
            return (da?.changePercent ?? Infinity) - (db?.changePercent ?? Infinity);
          case 'pe_asc': {
            const pa = da?.pe ?? Infinity;
            const pb = db?.pe ?? Infinity;
            return pa - pb;
          }
          case 'pe_desc': {
            const pa = da?.pe ?? -Infinity;
            const pb = db?.pe ?? -Infinity;
            return pb - pa;
          }
          case 'price_desc':
            return (db?.price ?? 0) - (da?.price ?? 0);
          case 'price_asc':
            return (da?.price ?? Infinity) - (db?.price ?? Infinity);
          case 'high52_proximity': {
            const proxA = da?.high52Week ? (da.high52Week - da.price) / da.high52Week : Infinity;
            const proxB = db?.high52Week ? (db.high52Week - db.price) / db.high52Week : Infinity;
            return proxA - proxB;
          }
          case 'ticker_asc':
            return a.ticker.localeCompare(b.ticker);
          case 'ticker_desc':
            return b.ticker.localeCompare(a.ticker);
          default:
            return 0;
        }
      });
    }

    function filterStocks() {
      const search = document.getElementById('searchInput').value.toUpperCase();
      const category = document.getElementById('categoryFilter').value;
      const hasAlertsOnly = document.getElementById('hasAlertsFilter').checked;
      const has52WeekHighOnly = document.getElementById('has52WeekHighFilter').checked;
      const sortBy = document.getElementById('sortBy').value;

      let filtered = allStocks.filter(stock => {
        const matchesSearch = !search || stock.ticker.includes(search);
        const matchesCategory = !category || stock.category === category;
        const matchesAlerts = !hasAlertsOnly || alerts[stock.ticker];
        
        let matchesHighFilter = true;
        const data = stockData[stock.ticker];
        if (has52WeekHighOnly && data) {
          matchesHighFilter = checkIs52WeekHigh(data.price, data.high52Week);
        }
        
        return matchesSearch && matchesCategory && matchesAlerts && matchesHighFilter;
      });

      renderStocks(sortStocks(filtered, sortBy));
    }

    function renderStocks(stocks) {
      const container = document.getElementById('stocksContainer');
      container.innerHTML = '';
      document.getElementById('stockCount').textContent = stocks.length + ' stock' + (stocks.length !== 1 ? 's' : '');

      stocks.forEach(stock => {
        const data = stockData[stock.ticker];
        
        if (!data) {
          const card = document.createElement('div');
          card.className = 'card';
          card.innerHTML = `<button class="remove-btn" onclick="event.stopPropagation();removeTicker('${stock.ticker}')" title="Remove">×</button><div class="ticker">${stock.ticker}</div><div class="loading" style="margin-top: 8px;">Loading...</div>`;
          container.appendChild(card);
          return;
        }

        const isAt52WeekHigh = checkIs52WeekHigh(data.price, data.high52Week);
        const hasAlert = !!alerts[stock.ticker];

        const card = document.createElement('div');
        card.className = 'card' + (isAt52WeekHigh ? ' highlight' : '');
        card.onclick = () => openDetailModal(stock.ticker);

        let badgesHTML = '';
        if (isAt52WeekHigh) badgesHTML += '<span class="badge badge-high">52w high</span>';
        if (hasAlert) badgesHTML += '<span class="badge badge-alert">alert</span>';

        const changeClass = data.change > 0 ? 'up' : data.change < 0 ? 'down' : '';
        
        card.innerHTML = `
          <button class="remove-btn" onclick="event.stopPropagation();removeTicker('${stock.ticker}')" title="Remove">×</button>
          <div class="ticker-row">
            <div class="ticker">${stock.ticker}</div>
            ${data.name ? `<div class="company-name">${data.name}</div>` : ''}
          </div>
          <div class="category">${getCategoryLabel(stock.category)}</div>
          ${badgesHTML}
          <div class="price">$${data.price.toFixed(2)}</div>
          <div class="change ${changeClass}">
            ${data.change > 0 ? '+' : ''}${data.changePercent.toFixed(2)}% (${data.change > 0 ? '+' : ''}$${data.change.toFixed(2)})
          </div>
          ${(() => {
            const pm = data.preMarket;
            if (!pm) return '';
            if (pm.marketState === 'PRE' && pm.preMarketPrice) {
              const cls = pm.preMarketChange > 0 ? 'up' : pm.preMarketChange < 0 ? 'down' : '';
              return `<div class="premarket-info"><span class="premarket-label">Pre-mkt:</span> $${pm.preMarketPrice.toFixed(2)} <span class="${cls}">${pm.preMarketChange > 0 ? '+' : ''}${pm.preMarketChangePct.toFixed(2)}%</span></div>`;
            }
            if ((pm.marketState === 'POST' || pm.marketState === 'CLOSED') && pm.postMarketPrice) {
              const cls = pm.postMarketChange > 0 ? 'up' : pm.postMarketChange < 0 ? 'down' : '';
              return `<div class="premarket-info"><span class="premarket-label">After-hrs:</span> $${pm.postMarketPrice.toFixed(2)} <span class="${cls}">${pm.postMarketChange > 0 ? '+' : ''}${pm.postMarketChangePct.toFixed(2)}%</span></div>`;
            }
            return '';
          })()}
          ${data.high52Week ? `<div class="high52">52w high: $${data.high52Week.toFixed(2)}</div>` : ''}
          <div class="metrics">
            <div class="metric-row">
              <span>P/E:</span>
              <span>${data.pe ? data.pe.toFixed(2) : 'N/A'}</span>
            </div>
            <div class="metric-row">
              <span>Fwd P/E:</span>
              <span>${data.forwardPE ? data.forwardPE.toFixed(2) : 'N/A'}</span>
            </div>
          </div>
          <button class="btn-set-alert" onclick="event.stopPropagation(); openAlertModal('${stock.ticker}')">Set alert</button>
        `;

        container.appendChild(card);
      });
    }

    async function openDetailModal(ticker) {
      currentDetailTicker = ticker;
      const data = stockData[ticker];
      
      document.getElementById('detailTicker').textContent = ticker;
      document.getElementById('detailCategory').textContent = getCategoryLabel(allStocks.find(s => s.ticker === ticker).category);
      document.getElementById('detailPrice').textContent = `$${data.price.toFixed(2)}`;
      document.getElementById('detailChange').textContent = `${data.change > 0 ? '+' : ''}${data.changePercent.toFixed(2)}%`;
      document.getElementById('detailPE').textContent = data.pe ? data.pe.toFixed(2) : 'N/A';
      document.getElementById('detailForwardPE').textContent = data.forwardPE ? data.forwardPE.toFixed(2) : 'N/A';
      document.getElementById('detailHigh52').textContent = data.high52Week ? `$${data.high52Week.toFixed(2)}` : 'N/A';
      document.getElementById('detailMarketCap').textContent = data.marketCap ? formatMarketCap(data.marketCap) : 'N/A';
      
      document.getElementById('detailModal').classList.add('active');
      currentChartType = '1y';
      
      setTimeout(async () => {
        await loadChart(ticker, '1y');
      }, 100);
    }

    async function loadChart(ticker, period) {
      try {
        const prices = await fetchHistoricalData(ticker, period);
        
        if (prices.length === 0) {
          const canvas = document.getElementById('priceChart');
          canvas.parentElement.innerHTML = '<p style="color: #999; padding: 2rem; text-align: center;">No chart data available</p>';
          return;
        }
        
        const labels = prices.map(p => p.date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }));
        const values = prices.map(p => p.price);

        const canvasElement = document.getElementById('priceChart');
        if (!canvasElement) return;

        if (currentChart) {
          currentChart.destroy();
        }

        const ctx = canvasElement.getContext('2d');
        
        currentChart = new Chart(ctx, {
          type: 'line',
          data: {
            labels: labels,
            datasets: [{
              label: ticker + ' Price',
              data: values,
              borderColor: '#378ADD',
              backgroundColor: 'rgba(55, 138, 221, 0.1)',
              tension: 0.1,
              fill: true,
              pointRadius: 0,
              borderWidth: 2
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: { display: true }
            },
            scales: {
              y: { beginAtZero: false }
            }
          }
        });
      } catch (error) {
        console.error('Error loading chart:', error);
      }
    }

    function switchChart(period) {
      currentChartType = period;
      
      document.querySelectorAll('.chart-tab').forEach(tab => tab.classList.remove('active'));
      event.target.classList.add('active');
      
      loadChart(currentDetailTicker, period);
    }

    function closeDetailModal() {
      document.getElementById('detailModal').classList.remove('active');
      if (currentChart) {
        currentChart.destroy();
        currentChart = null;
      }
    }

    function openAlertModal(ticker) {
      currentAlertTicker = ticker;
      document.getElementById('alertTickerName').textContent = ticker;
      const alert = alerts[ticker] || {};
      document.getElementById('priceAbove').value = alert.priceAbove || '';
      document.getElementById('priceBelow').value = alert.priceBelow || '';
      document.getElementById('percentChange').value = alert.percentChange || '';
      document.getElementById('alertModal').classList.add('active');
    }

    function closeAlertModal() {
      document.getElementById('alertModal').classList.remove('active');
      currentAlertTicker = null;
    }

    function saveAlert() {
      if (!currentAlertTicker) return;
      
      const priceAbove = document.getElementById('priceAbove').value;
      const priceBelow = document.getElementById('priceBelow').value;
      const percentChange = document.getElementById('percentChange').value;

      if (priceAbove || priceBelow || percentChange) {
        alerts[currentAlertTicker] = {
          priceAbove: priceAbove ? parseFloat(priceAbove) : null,
          priceBelow: priceBelow ? parseFloat(priceBelow) : null,
          percentChange: percentChange ? parseFloat(percentChange) : null
        };
      } else {
        delete alerts[currentAlertTicker];
      }

      localStorage.setItem('stockAlerts', JSON.stringify(alerts));
      closeAlertModal();
      filterStocks();
    }

    function resetFilters() {
      document.getElementById('searchInput').value = '';
      document.getElementById('categoryFilter').value = '';
      document.getElementById('hasAlertsFilter').checked = false;
      document.getElementById('has52WeekHighFilter').checked = false;
      document.getElementById('sortBy').value = '';
      filterStocks();
    }

    function refreshData() {
      loadAllStockData();
    }

    document.getElementById('searchInput').addEventListener('input', filterStocks);
    document.getElementById('categoryFilter').addEventListener('change', filterStocks);
    document.getElementById('hasAlertsFilter').addEventListener('change', filterStocks);
    document.getElementById('has52WeekHighFilter').addEventListener('change', filterStocks);

    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('open');
      document.getElementById('sidebarOverlay').classList.toggle('open');
    }

    loadAllStockData();
    setInterval(loadAllStockData, 300000);
  </script>
</body>
</html>
